<!-- Animated SVG -->
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_SVG_START:ANIMATION_47 class="fixed inset-0 w-full h-full" --><div class="fixed inset-0 w-full h-full" id="animated-svg-ANIMATION_47" style="display:block;"><svg viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<style>
    .dumbbell {
      fill: #FFFFFF;
      transform-origin: center;
      animation: lift 2s ease-in-out infinite;
    }
    @keyframes lift {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }
    .glint {
      fill: #E00600;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
<!-- Dumbbell Handle -->
<rect class="dumbbell" height="6" rx="2" width="40" x="30" y="47"></rect>
<!-- Left Weight -->
<rect class="dumbbell" height="30" rx="3" width="12" x="20" y="35"></rect>
<rect class="dumbbell" height="20" rx="2" width="6" x="15" y="40"></rect>
<!-- Right Weight -->
<rect class="dumbbell" height="30" rx="3" width="12" x="68" y="35"></rect>
<rect class="dumbbell" height="20" rx="2" width="6" x="79" y="40"></rect>
<!-- Accents -->
<circle class="glint" cx="26" cy="50" r="2"></circle>
<circle class="glint" cx="74" cy="50" r="2"></circle>
</svg></div><!-- STITCH_SVG_END:ANIMATION_47 -->
</body>
</html>
